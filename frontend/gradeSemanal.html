<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Grade Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #05080f;
  --ink2: #0d1220;
  --surface: #161e30;
  --surface2: #1c2640;
  --rim: rgba(100,160,255,0.12);
  --rim2: rgba(100,160,255,0.06);
  --blue: #4d8ef5;
  --cyan: #06d6c0;
  --violet: #7c3aed;
  --amber: #f59e0b;
  --rose: #f43f5e;
  --green: #10b981;
  --orange: #f97316;
  --snow: #f0f6ff;
  --muted: #6b82a8;
  --muted2: #8fa0c0;
  --ff-head: 'Space Grotesk', sans-serif;
  --ff-body: 'Cabinet Grotesk', sans-serif;
  --ff-mono: 'JetBrains Mono', monospace;
  --cell-h: 54px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--ff-body);background:var(--ink);color:var(--snow);display:flex;cursor:none;}

#cursor{position:fixed;width:10px;height:10px;background:var(--blue);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(77,142,245,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}

/* ── SIDEBAR ── */
.sidebar{width:240px;height:100vh;background:var(--ink2);border-right:1px solid var(--rim2);display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:24px 20px;border-bottom:1px solid var(--rim2);display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--snow);}
.sb-logo-mark{width:34px;height:34px;background:none;display:grid;place-items:center;flex-shrink:0;}
.sb-logo-text{font-family:var(--ff-head);font-size:17px;font-weight:700;}
.sb-logo-text em{color:var(--blue);font-style:normal;}
.sb-profile{padding:20px;border-bottom:1px solid var(--rim2);}
.sb-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--violet));display:grid;place-items:center;margin-bottom:10px;}
.sb-name{font-family:var(--ff-head);font-size:14px;font-weight:600;}
.sb-role{font-size:11px;color:var(--muted);margin-top:3px;}
.sb-section{padding:16px 20px 6px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--muted);cursor:none;border-left:2px solid transparent;transition:all .15s;text-decoration:none;}
.sb-item:hover{color:var(--snow);background:rgba(255,255,255,.025);}
.sb-item.active{color:var(--blue);background:rgba(77,142,245,.07);border-left-color:var(--blue);}
.sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--rim2);}
.sb-streak{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.streak-num{font-family:var(--ff-head);font-size:18px;color:var(--amber);font-weight:700;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── TOP BAR ── */
.top-bar{
  padding:16px 28px;border-bottom:1px solid var(--rim2);
  display:flex;align-items:center;gap:16px;flex-shrink:0;
  background:rgba(5,8,15,.7);backdrop-filter:blur(20px);
}
.week-nav{display:flex;align-items:center;gap:8px;}
.wnav{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--rim2);display:grid;place-items:center;cursor:none;transition:all .2s;color:var(--muted);}
.wnav:hover{border-color:var(--rim);color:var(--snow);}
.week-range{font-family:var(--ff-mono);font-size:12px;color:var(--muted2);min-width:136px;text-align:center;}
.today-btn{padding:7px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--rim2);font-size:12px;font-weight:600;color:var(--muted2);cursor:none;transition:all .2s;font-family:var(--ff-body);}
.today-btn:hover{border-color:var(--blue);color:var(--blue);}

.view-tabs{display:flex;background:var(--surface);border:1px solid var(--rim2);border-radius:9px;padding:3px;gap:2px;}
.vtab{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted);cursor:none;transition:all .18s;border:none;background:transparent;font-family:var(--ff-body);}
.vtab.active{background:var(--surface2);color:var(--snow);border:1px solid var(--rim);}

.top-right{display:flex;gap:8px;margin-left:auto;}
.tbtn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:none;transition:all .2s;font-family:var(--ff-body);}
.tbtn-outline{background:var(--surface);border:1px solid var(--rim2);color:var(--muted2);}
.tbtn-outline:hover{border-color:var(--rim);color:var(--snow);}
.tbtn-primary{background:linear-gradient(135deg,var(--blue),var(--violet));border:none;color:white;box-shadow:0 4px 14px rgba(77,142,245,.3);}
.tbtn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(77,142,245,.4);}

/* ── CALENDAR LAYOUT ── */
.cal-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* DAY HEADERS */
.day-headers{
  display:grid;
  grid-template-columns:52px repeat(7,1fr);
  border-bottom:1px solid var(--rim2);
  flex-shrink:0;
  background:var(--ink2);
}
.dh-empty{border-right:1px solid var(--rim2);}
.dh-cell{
  padding:10px 6px 8px;text-align:center;
  border-right:1px solid var(--rim2);
  position:relative;
  transition:background .15s;
}
.dh-cell:last-child{border-right:none;}
.dh-name{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--muted);}
.dh-num{font-family:var(--ff-head);font-size:20px;font-weight:700;line-height:1.1;margin-top:2px;}
.dh-cell.today .dh-name{color:var(--blue);}
.dh-cell.today .dh-num{
  color:var(--ink);
  background:var(--blue);
  width:34px;height:34px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:0;
}
.dh-dot-row{display:flex;justify-content:center;gap:3px;margin-top:5px;min-height:7px;}
.dh-dot{width:5px;height:5px;border-radius:50%;}

/* GRID SCROLL */
.grid-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  position:relative;
}
.grid-scroll::-webkit-scrollbar{width:5px;}
.grid-scroll::-webkit-scrollbar-track{background:transparent;}
.grid-scroll::-webkit-scrollbar-thumb{background:var(--rim);border-radius:100px;}

/* TIME GRID */
.time-grid{
  display:grid;
  grid-template-columns:52px repeat(7,1fr);
  position:relative;
}

.hour-gutter{
  height:var(--cell-h);
  display:flex;align-items:flex-start;padding-top:4px;
  font-size:10px;font-family:var(--ff-mono);color:var(--muted);
  border-bottom:1px solid var(--rim2);border-right:1px solid var(--rim2);
  background:var(--ink2);position:sticky;left:0;z-index:3;padding-left:6px;
}

.cal-cell{
  height:var(--cell-h);
  border-bottom:1px solid var(--rim2);
  border-right:1px solid var(--rim2);
  position:relative;
  transition:background .12s;
}
.cal-cell:last-child{border-right:none;}
.cal-cell:hover{background:rgba(77,142,245,.03);}
.cal-cell.today-col{background:rgba(77,142,245,.025);}
.cal-cell::after{
  content:'';position:absolute;left:0;right:0;
  top:50%;height:1px;background:var(--rim2);opacity:.4;
  pointer-events:none;
}

/* NOW LINE */
.now-line{
  position:absolute;left:0;right:0;
  height:2px;background:var(--rose);z-index:8;
  pointer-events:none;
}
.now-circle{
  position:absolute;left:-5px;top:-4px;
  width:10px;height:10px;
  background:var(--rose);border-radius:50%;
  box-shadow:0 0 0 3px rgba(244,63,94,.2);
  animation:nowpulse 2s ease-in-out infinite;
}
@keyframes nowpulse{0%,100%{box-shadow:0 0 0 3px rgba(244,63,94,.2);}50%{box-shadow:0 0 0 6px rgba(244,63,94,0);}}

/* EVENTS */
.event{
  position:absolute;left:3px;right:3px;
  border-radius:9px;padding:5px 8px;
  overflow:hidden;cursor:none;
  transition:filter .15s, transform .15s, box-shadow .15s;
  z-index:4;
  border-left:3px solid transparent;
}
.event:hover{filter:brightness(1.12);transform:scale(1.015);box-shadow:0 4px 18px rgba(0,0,0,.35);z-index:6;}
.event-title{font-size:11px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-sub{font-size:10px;opacity:.72;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-time{font-family:var(--ff-mono);font-size:9px;opacity:.6;margin-top:3px;}
.event.ghost{opacity:.55;pointer-events:none;animation:ghostIn .2s ease;}
@keyframes ghostIn{from{opacity:0;transform:scaleY(.9);}to{opacity:.55;transform:scaleY(1);}}
.event.new-anim{animation:eventPop .35s cubic-bezier(.25,.46,.45,.94);}
@keyframes eventPop{from{opacity:0;transform:scaleY(.7);transform-origin:top;}to{opacity:1;transform:scaleY(1);}}

/* DRAG GHOST */
.drag-preview{
  position:absolute;left:3px;right:3px;
  background:rgba(77,142,245,.15);border:2px dashed rgba(77,142,245,.4);
  border-radius:9px;pointer-events:none;z-index:5;display:none;
}
.drag-preview-time{font-family:var(--ff-mono);font-size:10px;color:var(--blue);padding:5px 8px;}

/* ── EVENT DETAIL PANEL ── */
.detail-panel{
  position:fixed;right:0;top:0;bottom:0;width:320px;
  background:var(--ink2);border-left:1px solid var(--rim);
  z-index:50;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);
  box-shadow:-8px 0 32px rgba(0,0,0,.4);
}
.detail-panel.open{transform:translateX(0);}
.dp-head{padding:20px;border-bottom:1px solid var(--rim2);display:flex;align-items:flex-start;justify-content:space-between;}
.dp-color-strip{width:4px;border-radius:100px;align-self:stretch;margin-right:12px;flex-shrink:0;}
.dp-title-wrap{flex:1;}
.dp-name{font-family:var(--ff-head);font-size:17px;font-weight:700;line-height:1.2;margin-bottom:4px;}
.dp-sub{font-size:12px;color:var(--muted);}
.dp-close{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--rim2);display:grid;place-items:center;cursor:none;color:var(--muted);transition:all .2s;flex-shrink:0;}
.dp-close:hover{color:var(--snow);border-color:var(--rim);}
.dp-body{flex:1;overflow-y:auto;padding:20px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--rim);}
.dp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--rim2);}
.dp-row:last-child{border-bottom:none;}
.dp-row-icon{width:28px;height:28px;border-radius:8px;background:var(--surface);display:grid;place-items:center;flex-shrink:0;color:var(--muted);}
.dp-row-label{font-size:11px;color:var(--muted);margin-bottom:2px;}
.dp-row-val{font-size:13px;font-weight:600;}
.dp-footer{padding:16px 20px;border-top:1px solid var(--rim2);display:flex;gap:8px;}
.dp-btn{flex:1;padding:10px;border-radius:9px;font-size:12px;font-weight:700;font-family:var(--ff-body);cursor:none;transition:all .2s;text-align:center;}
.dp-edit{background:rgba(77,142,245,.1);border:1px solid rgba(77,142,245,.2);color:var(--blue);}
.dp-edit:hover{background:rgba(77,142,245,.2);}
.dp-del{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.18);color:var(--rose);}
.dp-del:hover{background:rgba(244,63,94,.15);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(5,8,15,.85);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--ink2);border:1px solid var(--rim);border-radius:20px;padding:28px;width:440px;max-width:94vw;animation:modalIn .3s cubic-bezier(.25,.46,.45,.94);}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-family:var(--ff-head);font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.modal-x{background:none;border:none;color:var(--muted);cursor:none;font-size:18px;transition:color .2s;padding:4px;}
.modal-x:hover{color:var(--snow);}
.mf{margin-bottom:13px;}
.mf label{display:block;font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--surface);border:1px solid var(--rim2);border-radius:9px;padding:10px 12px;font-family:var(--ff-body);font-size:13px;color:var(--snow);outline:none;transition:all .2s;caret-color:var(--blue);}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--blue);background:var(--surface2);}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:26px;height:26px;border-radius:7px;cursor:none;transition:all .2s;border:2px solid transparent;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.sel{border-color:white;transform:scale(1.1);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.mbtn-cancel{padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:var(--ff-body);cursor:none;background:transparent;border:1px solid var(--rim2);color:var(--muted);transition:all .2s;}
.mbtn-cancel:hover{border-color:var(--rim);color:var(--snow);}
.mbtn-save{padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;font-family:var(--ff-body);cursor:none;background:linear-gradient(135deg,var(--blue),var(--violet));border:none;color:white;box-shadow:0 4px 14px rgba(77,142,245,.3);transition:all .2s;}
.mbtn-save:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(77,142,245,.4);}

/* ── MINI CALENDAR ── */
.mini-cal{padding:16px 20px;border-top:1px solid var(--rim2);}
.mini-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mini-cal-title{font-size:12px;font-weight:700;font-family:var(--ff-head);}
.mini-nav{background:none;border:none;color:var(--muted);cursor:none;width:22px;height:22px;display:grid;place-items:center;border-radius:5px;transition:all .15s;}
.mini-nav:hover{background:var(--surface);color:var(--snow);}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-day-name{font-size:9px;text-align:center;color:var(--muted);padding:2px 0;font-weight:600;}
.mini-day{font-size:11px;text-align:center;padding:4px 2px;border-radius:5px;cursor:none;transition:all .15s;color:var(--muted2);}
.mini-day:hover{background:var(--surface);color:var(--snow);}
.mini-day.today{background:var(--blue);color:var(--ink);font-weight:700;}
.mini-day.in-week{background:rgba(77,142,245,.1);color:var(--blue);}
.mini-day.other-month{opacity:.35;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid rgba(6,214,192,.3);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:all .3s cubic-bezier(.25,.46,.45,.94);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:900px){.sidebar{display:none;}}
</style>
</head>

    <!-- Grid scroll -->

    </div>

<div class="toast" id="toast"></div>

<script>
/* ── CURSOR ── */
const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animCursor(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);})();
function setCursorBig(big){
  cur.style.width=big?'16px':'10px';cur.style.height=big?'16px':'10px';
  ring.style.width=big?'48px':'36px';ring.style.height=big?'48px':'36px';
  ring.style.borderColor=big?'rgba(77,142,245,.55)':'rgba(77,142,245,.35)';
}
document.addEventListener('mouseover',e=>{
  setCursorBig(!!e.target.closest('button,a,input,select,.event,.mini-day,.color-swatch'));
});

/* ── CONSTANTS ── */
const CELL_H=54;
const HOURS=Array.from({length:17},(_,i)=>i+6); // 6–22
const DAYS_S=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const COLORS_LIST=[
  {hex:'#4d8ef5',name:'Azul'},
  {hex:'#7c3aed',name:'Violeta'},
  {hex:'#06d6c0',name:'Ciano'},
  {hex:'#f59e0b',name:'Âmbar'},
  {hex:'#f43f5e',name:'Rosa'},
  {hex:'#10b981',name:'Verde'},
  {hex:'#f97316',name:'Laranja'},
  {hex:'#06b6d4',name:'Celeste'},
];

const CAT_COLORS={
  'Matemática':'#4d8ef5','Física':'#7c3aed','Química':'#f43f5e',
  'Programação':'#06d6c0','Banco de Dados':'#f59e0b','Redes':'#f97316',
  'Português':'#10b981','Inglês':'#06b6d4',
  'Estudo pessoal':'#8fa0c0','Intervalo':'#6b82a8','Outro':'#6b82a8',
};

/* ── STATE ── */
let weekOffset=0;
let viewMode='week'; // 'week' | 'day'
let dayViewOffset=0; // which day in day view
let selectedEventId=null;
let editingEventId=null;
let selectedColor='#4d8ef5';
let miniMonthOffset=0;
let nextId=100;

/* ── EVENTS DATA ── */
let events=[
  {id:1,title:'Aula de Programação',loc:'Lab 204',cat:'Programação',color:'#06d6c0',dow:1,startH:7,startM:30,durMin:90,fixed:true},
  {id:2,title:'Aula de Redes',loc:'Sala 12',cat:'Redes',color:'#f97316',dow:2,startH:8,startM:0,durMin:90,fixed:true},
  {id:3,title:'Aula de Física',loc:'Sala 8',cat:'Física',color:'#7c3aed',dow:1,startH:13,startM:0,durMin:90,fixed:true},
  {id:4,title:'Aula de Matemática',loc:'Sala 5',cat:'Matemática',color:'#4d8ef5',dow:3,startH:7,startM:30,durMin:90,fixed:true},
  {id:5,title:'Aula de BD',loc:'Lab 1',cat:'Banco de Dados',color:'#f59e0b',dow:4,startH:8,startM:0,durMin:90,fixed:true},
  {id:6,title:'Aula de Inglês',loc:'Sala 3',cat:'Inglês',color:'#06b6d4',dow:5,startH:7,startM:30,durMin:60,fixed:true},
  {id:7,title:'Almoço',loc:'',cat:'Intervalo',color:'#6b82a8',dow:1,startH:12,startM:0,durMin:60,fixed:true},
  {id:8,title:'Almoço',loc:'',cat:'Intervalo',color:'#6b82a8',dow:2,startH:12,startM:0,durMin:60,fixed:true},
  {id:9,title:'Almoço',loc:'',cat:'Intervalo',color:'#6b82a8',dow:3,startH:12,startM:0,durMin:60,fixed:true},
  {id:10,title:'Almoço',loc:'',cat:'Intervalo',color:'#6b82a8',dow:4,startH:12,startM:0,durMin:60,fixed:true},
  {id:11,title:'Almoço',loc:'',cat:'Intervalo',color:'#6b82a8',dow:5,startH:12,startM:0,durMin:60,fixed:true},
  {id:12,title:'Estudo — Matemática',loc:'Casa',cat:'Matemática',color:'#4d8ef5',dow:1,startH:19,startM:0,durMin:90},
  {id:13,title:'Revisão de Física',loc:'',cat:'Física',color:'#7c3aed',dow:2,startH:19,startM:0,durMin:120},
  {id:14,title:'Projeto BD',loc:'',cat:'Banco de Dados',color:'#f59e0b',dow:4,startH:19,startM:0,durMin:90},
  {id:15,title:'Simulado Física',loc:'',cat:'Física',color:'#7c3aed',dow:6,startH:10,startM:0,durMin:90},
];

/* ── WEEK DATES ── */
function getWeekDates(offset=weekOffset){
  const t=new Date();t.setHours(0,0,0,0);
  const dow=t.getDay();
  const mon=new Date(t);mon.setDate(t.getDate()-((dow+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}

/* ── RENDER ── */
function render(){
  if(viewMode==='week') renderWeek();
  else renderDay();
  renderMiniCal();
}

function renderWeek(){
  const dates=getWeekDates();
  const today=todayDate();

  // Week range label
  const fmt=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('week-range').textContent=`${fmt(dates[0])} – ${fmt(dates[6])}`;

  // Day headers
  const dh=document.getElementById('day-headers');
  dh.style.gridTemplateColumns='52px repeat(7,1fr)';
  dh.innerHTML='<div class="dh-empty"></div>';
  dates.forEach(d=>{
    const isT=d.toDateString()===today.toDateString();
    const dayEvents=events.filter(e=>e.dow===d.getDay());
    const dots=dayEvents.slice(0,5).map(e=>`<div class="dh-dot" style="background:${e.color};opacity:.7"></div>`).join('');
    dh.innerHTML+=`
      <div class="dh-cell${isT?' today':''}">
        <div class="dh-name">${DAYS_S[d.getDay()]}</div>
        <div class="dh-num">${d.getDate()}</div>
        <div class="dh-dot-row">${dots}</div>
      </div>`;
  });

  // Time grid
  const tg=document.getElementById('time-grid');
  tg.style.gridTemplateColumns='52px repeat(7,1fr)';
  tg.innerHTML='';

  HOURS.forEach(h=>{
    const hl=document.createElement('div');
    hl.className='hour-gutter';
    hl.textContent=h<10?`0${h}h`:`${h}h`;
    tg.appendChild(hl);

    dates.forEach((d,di)=>{
      const cell=document.createElement('div');
      cell.className='cal-cell'+(d.toDateString()===today.toDateString()?' today-col':'');
      cell.dataset.dow=d.getDay();
      cell.dataset.hour=h;
      cell.dataset.date=d.toISOString().split('T')[0];
      cell.addEventListener('click',onCellClick);
      tg.appendChild(cell);
    });
  });

  // Place events
  events.forEach(ev=>placeEventInGrid(ev,dates));

  // Now line
  placeNowLine(dates);
}

function renderDay(){
  const today=todayDate();
  const base=getWeekDates()[0];
  const d=new Date(base);d.setDate(base.getDate()+dayViewOffset);

  const fmt2=`${DAYS_S[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
  document.getElementById('week-range').textContent=fmt2;

  const dh=document.getElementById('day-headers');
  dh.style.gridTemplateColumns='52px 1fr';
  const isT=d.toDateString()===today.toDateString();
  const dayEvs=events.filter(e=>e.dow===d.getDay());
  const dots=dayEvs.slice(0,6).map(e=>`<div class="dh-dot" style="background:${e.color};width:7px;height:7px;"></div>`).join('');
  dh.innerHTML=`<div class="dh-empty"></div>
    <div class="dh-cell${isT?' today':''}">
      <div class="dh-name">${DAYS_S[d.getDay()]}</div>
      <div class="dh-num">${d.getDate()}</div>
      <div class="dh-dot-row">${dots}</div>
    </div>`;

  const tg=document.getElementById('time-grid');
  tg.style.gridTemplateColumns='52px 1fr';
  tg.innerHTML='';

  HOURS.forEach(h=>{
    const hl=document.createElement('div');
    hl.className='hour-gutter';hl.textContent=h<10?`0${h}h`:`${h}h`;
    tg.appendChild(hl);
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isT?' today-col':'');
    cell.dataset.dow=d.getDay();cell.dataset.hour=h;
    cell.dataset.date=d.toISOString().split('T')[0];
    cell.addEventListener('click',onCellClick);
    tg.appendChild(cell);
  });

  events.filter(e=>e.dow===d.getDay()).forEach(ev=>placeEventInGrid(ev,[d]));
  if(isT)placeNowLine([d]);
}

/* ── PLACE EVENT ── */
function placeEventInGrid(ev,dates){
  const tg=document.getElementById('time-grid');
  const cols=tg.querySelectorAll('.cal-cell');
  const firstH=HOURS[0];
  const colsPerRow=viewMode==='week'?7:1;

  // Find column index
  let colIdx=-1;
  if(viewMode==='week'){
    colIdx=dates.findIndex(d=>d.getDay()===ev.dow);
  } else {
    colIdx=dates.length>0&&dates[0].getDay()===ev.dow?0:-1;
  }
  if(colIdx===-1)return;

  const rowIdx=ev.startH-firstH;
  if(rowIdx<0||rowIdx>=HOURS.length)return;
  const cellIndex=rowIdx*colsPerRow+colIdx;
  const anchor=cols[cellIndex];
  if(!anchor)return;

  const topOffset=(ev.startM/60)*CELL_H;
  const heightPx=Math.max((ev.durMin/60)*CELL_H-4,20);

  // Color with alpha bg
  const hex=ev.color||'#4d8ef5';
  const rgb=hexToRgb(hex);

  const block=document.createElement('div');
  block.className='event new-anim';
  block.id='ev-'+ev.id;
  block.style.cssText=`
    top:${topOffset}px;height:${heightPx}px;
    background:rgba(${rgb},.14);
    border-left-color:${hex};
    color:${hex};
  `;

  const endH=Math.floor((ev.startH*60+ev.startM+ev.durMin)/60);
  const endM=(ev.startM+ev.durMin)%60;
  const ts=`${pad(ev.startH)}:${pad(ev.startM)} – ${pad(endH)}:${pad(endM)}`;

  block.innerHTML=`
    <div class="event-title">${ev.title}</div>
    ${ev.loc?`<div class="event-sub">${ev.loc}</div>`:''}
    <div class="event-time">${ts}</div>`;

  block.addEventListener('click',e=>{e.stopPropagation();openDetail(ev.id);});

  anchor.style.position='relative';
  anchor.appendChild(block);
}

/* ── NOW LINE ── */
function placeNowLine(dates){
  const now=new Date();
  const today=todayDate();
  const colsPerRow=viewMode==='week'?7:1;
  const colIdx=viewMode==='week'
    ?dates.findIndex(d=>d.toDateString()===today.toDateString())
    :dates[0]?.toDateString()===today.toDateString()?0:-1;
  if(colIdx===-1)return;

  const tg=document.getElementById('time-grid');
  const cols=tg.querySelectorAll('.cal-cell');
  const firstH=HOURS[0];
  const h=now.getHours(),m=now.getMinutes();
  if(h<firstH||h>HOURS[HOURS.length-1])return;

  const rowIdx=h-firstH;
  const anchor=cols[rowIdx*colsPerRow+colIdx];
  if(!anchor)return;

  anchor.style.position='relative';
  const line=document.createElement('div');
  line.className='now-line';
  line.style.top=((m/60)*CELL_H)+'px';
  line.innerHTML='<div class="now-circle"></div>';
  anchor.appendChild(line);

  // Scroll to now
  setTimeout(()=>{
    const gs=document.getElementById('grid-scroll');
    const scrollTarget=rowIdx*CELL_H-gs.clientHeight/2+100;
    gs.scrollTo({top:Math.max(0,scrollTarget),behavior:'smooth'});
  },150);
}

/* ── CELL CLICK → quick create ── */
function onCellClick(e){
  if(e.target!==e.currentTarget)return;
  const cell=e.currentTarget;
  const hour=parseInt(cell.dataset.hour);
  const date=cell.dataset.date;
  openModal(null,{date,startH:hour,startM:0,durMin:60});
}

/* ── DETAIL PANEL ── */
function openDetail(id){
  const ev=events.find(e=>e.id===id);
  if(!ev)return;
  selectedEventId=id;

  document.getElementById('dp-strip').style.background=ev.color;
  document.getElementById('dp-name').textContent=ev.title;
  document.getElementById('dp-sub').textContent=ev.cat||'Evento';

  const endH=Math.floor((ev.startH*60+ev.startM+ev.durMin)/60);
  const endM=(ev.startM+ev.durMin)%60;
  const dayName=DAYS_S[ev.dow];
  const dur=`${Math.floor(ev.durMin/60)}h${ev.durMin%60?` ${ev.durMin%60}min`:''}`;

  document.getElementById('dp-body').innerHTML=`
    <div class="dp-row">
      <div class="dp-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div><div class="dp-row-label">Horário</div><div class="dp-row-val">${pad(ev.startH)}:${pad(ev.startM)} – ${pad(endH)}:${pad(endM)}</div></div>
    </div>
    <div class="dp-row">
      <div class="dp-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <div><div class="dp-row-label">Dia da semana</div><div class="dp-row-val">${dayName}</div></div>
    </div>
    <div class="dp-row">
      <div class="dp-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div><div class="dp-row-label">Matéria</div><div class="dp-row-val">${ev.cat||'—'}</div></div>
    </div>
    ${ev.loc?`<div class="dp-row">
      <div class="dp-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div><div class="dp-row-label">Local</div><div class="dp-row-val">${ev.loc}</div></div>
    </div>`:''}
    <div class="dp-row">
      <div class="dp-row-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div><div class="dp-row-label">Duração</div><div class="dp-row-val">${dur}</div></div>
    </div>
    ${ev.fixed?`<div class="dp-row"><div class="dp-row-icon">🔒</div><div><div class="dp-row-label">Tipo</div><div class="dp-row-val" style="color:var(--muted)">Aula fixa (recorrente)</div></div></div>`:''}`;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  selectedEventId=null;
}

function editEvent(){
  if(!selectedEventId)return;
  const ev=events.find(e=>e.id===selectedEventId);
  if(!ev)return;
  closeDetail();
  openModal(ev);
}

function deleteEvent(){
  if(!selectedEventId)return;
  if(events.find(e=>e.id===selectedEventId)?.fixed){
    showToast('🔒 Aulas fixas não podem ser excluídas');return;
  }
  events=events.filter(e=>e.id!==selectedEventId);
  closeDetail();
  render();
  showToast('🗑️ Evento excluído');
}

/* ── MODAL ── */
function buildColorRow(sel){
  const cr=document.getElementById('color-row');
  cr.innerHTML='';
  COLORS_LIST.forEach(c=>{
    const s=document.createElement('div');
    s.className='color-swatch'+(c.hex===sel?' sel':'');
    s.style.background=c.hex;
    s.title=c.name;
    s.onclick=()=>{
      selectedColor=c.hex;
      document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
    };
    cr.appendChild(s);
  });
}

function openModal(ev=null,prefill=null){
  editingEventId=ev?ev.id:null;
  document.getElementById('modal-label').textContent=ev?'Editar evento':'Novo evento';
  selectedColor=ev?ev.color:'#4d8ef5';
  buildColorRow(selectedColor);

  const today=new Date().toISOString().split('T')[0];
  document.getElementById('m-title').value=ev?ev.title:'';
  document.getElementById('m-loc').value=ev?ev.loc:'';
  document.getElementById('m-cat').value=ev?ev.cat:'';
  document.getElementById('m-date').value=prefill?prefill.date:today;

  if(prefill){
    const sh=prefill.startH,sm=prefill.startM||0;
    const eh=sh+Math.floor((sm+60)/60),em=(sm+60)%60;
    document.getElementById('m-start').value=`${pad(sh)}:${pad(sm)}`;
    document.getElementById('m-end').value=`${pad(eh)}:${pad(em)}`;
  } else if(ev){
    document.getElementById('m-start').value=`${pad(ev.startH)}:${pad(ev.startM)}`;
    const eh=Math.floor((ev.startH*60+ev.startM+ev.durMin)/60);
    const em=(ev.startM+ev.durMin)%60;
    document.getElementById('m-end').value=`${pad(eh)}:${pad(em)}`;
    document.getElementById('m-date').value=today;
  } else {
    document.getElementById('m-start').value='08:00';
    document.getElementById('m-end').value='09:30';
  }

  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('m-title').focus(),80);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveModal(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}

  const startStr=document.getElementById('m-start').value;
  const endStr=document.getElementById('m-end').value;
  const dateStr=document.getElementById('m-date').value;
  const cat=document.getElementById('m-cat').value;
  const loc=document.getElementById('m-loc').value.trim();

  const [sh,sm]=startStr.split(':').map(Number);
  const [eh,em]=endStr.split(':').map(Number);
  const durMin=(eh*60+em)-(sh*60+sm);
  if(durMin<=0){showToast('⚠️ Horário de fim deve ser após o início');return;}

  const dow=new Date(dateStr+'T12:00:00').getDay();
  const color=selectedColor||(CAT_COLORS[cat]||'#4d8ef5');

  if(editingEventId){
    const ev=events.find(e=>e.id===editingEventId);
    if(ev){Object.assign(ev,{title,loc,cat,color,dow,startH:sh,startM:sm,durMin});}
  } else {
    events.push({id:nextId++,title,loc,cat,color,dow,startH:sh,startM:sm,durMin,fixed:false});
  }

  closeModal();
  render();
  showToast(editingEventId?'✅ Evento atualizado!':'✅ Evento criado!');
}

/* ── VIEW / NAV ── */
function setView(v,btn){
  viewMode=v;dayViewOffset=0;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function shiftWeek(d){
  if(viewMode==='week'){weekOffset+=d;}
  else{dayViewOffset+=d;}
  render();
}

function goToday(){weekOffset=0;dayViewOffset=0;render();}

/* ── MINI CALENDAR ── */
function renderMiniCal(){
  const today=todayDate();
  const base=new Date(today.getFullYear(),today.getMonth()+miniMonthOffset,1);
  const label=`${MONTHS[base.getMonth()].slice(0,3)} ${base.getFullYear()}`;
  document.getElementById('mini-month-label').textContent=label;

  const weekDates=getWeekDates();
  const grid=document.getElementById('mini-grid');
  grid.innerHTML='';

  ['S','T','Q','Q','S','S','D'].forEach(n=>{
    const d=document.createElement('div');
    d.className='mini-day-name';d.textContent=n;grid.appendChild(d);
  });

  const firstDay=new Date(base.getFullYear(),base.getMonth(),1).getDay();
  const daysInMonth=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  const startDow=(firstDay+6)%7;

  for(let i=0;i<startDow;i++){
    const d=document.createElement('div');
    d.className='mini-day other-month';
    const prev=new Date(base.getFullYear(),base.getMonth(),0);
    d.textContent=prev.getDate()-startDow+1+i;
    grid.appendChild(d);
  }

  for(let i=1;i<=daysInMonth;i++){
    const d=document.createElement('div');
    const thisDate=new Date(base.getFullYear(),base.getMonth(),i);
    const isToday=thisDate.toDateString()===today.toDateString();
    const inWeek=weekDates.some(w=>w.toDateString()===thisDate.toDateString());
    d.className='mini-day'+(isToday?' today':inWeek&&!isToday?' in-week':'');
    d.textContent=i;
    d.onclick=()=>{
      // Jump to that week
      const diff=Math.round((thisDate-today)/(7*86400000));
      weekOffset=diff>=0?Math.ceil(diff):Math.floor(diff);
      // Correct: compute exact offset
      const todayD=todayDate();
      const dayDiff=Math.floor((thisDate-todayD)/86400000);
      const weekDiff=Math.floor(dayDiff/7);
      weekOffset=weekDiff;
      if(viewMode==='day'){
        const base2=getWeekDates()[0];
        dayViewOffset=Math.floor((thisDate-base2)/86400000);
      }
      render();
    };
    grid.appendChild(d);
  }
}

function miniNavMonth(d){miniMonthOffset+=d;renderMiniCal();}

/* ── UTILS ── */
function pad(n){return String(n).padStart(2,'0');}
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`${r},${g},${b}`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── INIT ── */
render();

// Update now line every minute
setInterval(()=>{
  document.querySelectorAll('.now-line').forEach(n=>n.remove());
  if(viewMode==='week') placeNowLine(getWeekDates());
  else placeNowLine([getWeekDates()[dayViewOffset]]);
},60000);

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')shiftWeek(-1);
  if(e.key==='ArrowRight')shiftWeek(1);
  if(e.key==='Escape'){closeDetail();closeModal();}
  if(e.key==='t'||e.key==='T')goToday();
  if(e.key==='n'||e.key==='N')openModal();
});
</script>
